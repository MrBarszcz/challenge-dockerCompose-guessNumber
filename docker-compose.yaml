services:
  apache-frontend:
    image: httpd:alpine
    container_name: jogo_frontend
    ports:
      - "8080:80"
    volumes:
      - ./assets:/usr/local/apache2/htdocs/
    depends_on:
      - dotnet-backend
      
  dotnet-backend:
    build: ./GuessNumberGame
    container_name: jogo_backend
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080