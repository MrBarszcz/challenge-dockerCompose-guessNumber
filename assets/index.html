<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Adivinhação - .NET + Apache</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Adivinhe o Número</h1>
        <p>Tente adivinhar o número secreto entre <strong>1 e 100</strong></p>
        
        <div class="input-area">
            <input type="number" id="guess" placeholder="Digite seu palpite" min="1" max="100">
            <button id="btn-attempt">Tentar</button>
        </div>

        <p id="message" class="message"></p>
        <p>Tentativas: <span id="attempts">0</span></p>
        
        <button id="btn-restart" class="hidden">Jogar Novamente</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
